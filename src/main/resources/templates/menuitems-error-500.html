<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menu Items Error 500</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fef2f2; }
        .box { max-width: 760px; margin: 40px auto; background: #fff; border: 1px solid #ef4444; border-radius: 10px; padding: 20px; }
        h2 { color: #b91c1c; margin-top: 0; }
        pre { background: #fff1f2; padding: 10px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>
<div class="box">
    <h2>Menu Items - 500 Server Error</h2>
    <p><strong>Action:</strong> <span th:text="${action}"></span></p>
    <p>Something unexpected happened while processing this menu item request.</p>
    <pre th:text="${errorBody}"></pre>
    <a href="/menuitems">Back to Menu Items</a>
</div>
</body>
</html>
