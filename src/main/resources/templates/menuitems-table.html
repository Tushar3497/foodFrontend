<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menu Items - Table</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; }
        .wrap { max-width: 1100px; margin: 30px auto; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; color: #1f2937; }
        a { text-decoration: none; color: #1f2937; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #d1d5db; padding: 10px; text-align: left; }
        th { background: #111827; color: #fff; }
        .empty { margin-top: 12px; color: #6b7280; }
    </style>
</head>
<body>
<div class="wrap">
    <a href="/menuitems">Back to Menu Items</a>
    <h2 th:text="${title != null ? title : 'Menu Items'}"></h2>
    <div th:if="${menuItems == null or #lists.isEmpty(menuItems)}" class="empty">No records found.</div>
    <table th:if="${menuItems != null and !#lists.isEmpty(menuItems)}">
        <thead>
        <tr>
            <th>Item ID</th>
            <th>Item Name</th>
            <th>Description</th>
            <th>Price</th>
            <th>Restaurant ID</th>
            <th th:if="${title != null and #strings.containsIgnoreCase(title, 'rating')}">Rating</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${menuItems}">
            <td th:text="${item.itemId}"></td>
            <td th:text="${item.itemName}"></td>
            <td th:text="${item.itemDescription}"></td>
            <td th:text="${item.itemPrice}"></td>
            <td th:text="${item.restaurantId}"></td>
            <td th:if="${title != null and #strings.containsIgnoreCase(title, 'rating')}" th:text="${item.rating}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
