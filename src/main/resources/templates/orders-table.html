<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orders - Table</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; }
        .wrap { max-width: 1200px; margin: 30px auto; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; color: #1f2937; }
        a { text-decoration: none; color: #1f2937; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #d1d5db; padding: 10px; text-align: left; }
        th { background: #111827; color: #fff; }
        .empty { margin-top: 12px; color: #6b7280; }
    </style>
</head>
<body>
<div class="wrap">
    <a href="/orders">Back to Orders</a>
    <h2 th:text="${title != null ? title : 'Orders'}"></h2>
    <div th:if="${orders == null or #lists.isEmpty(orders)}" class="empty">No orders found.</div>
    <table th:if="${orders != null and !#lists.isEmpty(orders)}">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Customer ID</th>
            <th>Restaurant ID</th>
            <th>Driver ID</th>
            <th>Status</th>
            <th>Order Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="${o['orderId']}"></td>
            <td th:text="${o['customerId']}"></td>
            <td th:text="${o['restaurantId']}"></td>
            <td th:text="${o['deliveryDriverId']}"></td>
            <td th:text="${o['orderStatus']}"></td>
            <td th:text="${o['orderDate']}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
