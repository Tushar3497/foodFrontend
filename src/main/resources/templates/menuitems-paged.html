<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menu Items - Paged</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; }
        .wrap { max-width: 1100px; margin: 30px auto; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; color: #1f2937; }
        a { text-decoration: none; color: #1f2937; font-weight: bold; }
        .meta { margin-top: 12px; padding: 10px; background: #eff6ff; border: 1px solid #93c5fd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #d1d5db; padding: 10px; text-align: left; }
        th { background: #111827; color: #fff; }
    </style>
</head>
<body>
<div class="wrap">
    <a href="/menuitems">Back to Menu Items</a>
    <h2 th:text="${title != null ? title : 'Paged Menu Items'}"></h2>

    <div class="meta">
        <div><strong>Current Page:</strong> <span th:text="${currentPage}"></span></div>
        <div><strong>Total Pages:</strong> <span th:text="${totalPages}"></span></div>
        <div><strong>Total Elements:</strong> <span th:text="${totalElements}"></span></div>
        <div><strong>Elements In Current Page:</strong> <span th:text="${elementsInCurrentPage}"></span></div>
    </div>

    <table th:if="${menuItems != null and !#lists.isEmpty(menuItems)}">
        <thead>
        <tr>
            <th>Item ID</th>
            <th>Item Name</th>
            <th>Description</th>
            <th>Price</th>
            <th>Restaurant ID</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${menuItems}">
            <td th:text="${item.itemId}"></td>
            <td th:text="${item.itemName}"></td>
            <td th:text="${item.itemDescription}"></td>
            <td th:text="${item.itemPrice}"></td>
            <td th:text="${item.restaurantId}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
