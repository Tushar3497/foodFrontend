<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root { --bg1:#0a0a0f; --accent:#ff6b35; --accent2:#f7c59f; --gold:#ffd700; --text:#f0ece3; --muted:#7a7a8a; --card-bg:rgba(255,255,255,0.045); --card-border:rgba(255,107,53,0.18); --th-bg:rgba(255,107,53,0.15); --tr-hover:rgba(255,107,53,0.07); --td-border:rgba(255,255,255,0.04); --glow:rgba(255,107,53,0.25); }
        body.light { --bg1:#fff8f3; --accent:#e85d04; --accent2:#f4a261; --text:#1a1a2e; --muted:#888; --card-bg:rgba(255,255,255,0.9); --card-border:rgba(232,93,4,0.2); --th-bg:rgba(232,93,4,0.1); --tr-hover:rgba(232,93,4,0.05); --td-border:rgba(0,0,0,0.05); --glow:rgba(232,93,4,0.12); }
        body { font-family:'DM Sans',sans-serif; background:var(--bg1); color:var(--text); min-height:100vh; overflow-x:hidden; transition:background 0.5s,color 0.5s; }
        .bg-canvas { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
        .orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.15; animation:drift 18s ease-in-out infinite alternate; }
        .orb1 { width:500px; height:500px; background:#ff6b35; top:-130px; left:-100px; animation-duration:14s; }
        .orb2 { width:360px; height:360px; background:#ff9a3c; bottom:-80px; right:-60px; animation-duration:20s; animation-delay:-6s; }
        .orb3 { width:240px; height:240px; background:#ffcc44; top:40%; left:60%; animation-duration:17s; animation-delay:-4s; }
        body.light .orb { opacity:0.1; }
        @keyframes drift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(40px,30px) scale(1.1)} }
        body::after { content:''; position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0.4; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E"); }
        .toggle { position:fixed; top:22px; right:26px; z-index:100; background:var(--card-bg); backdrop-filter:blur(12px); border:1px solid var(--card-border); border-radius:100px; padding:10px 20px; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; color:var(--text); font-weight:500; transition:all 0.3s; }
        .toggle:hover { background:var(--accent); color:#fff; border-color:var(--accent); transform:scale(1.05); }
        .page { position:relative; z-index:10; min-height:100vh; padding:40px; }
        .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--muted); text-decoration:none; font-size:13px; font-weight:500; padding:10px 20px; border:1px solid var(--card-border); border-radius:100px; background:var(--card-bg); backdrop-filter:blur(10px); transition:all 0.3s; margin-bottom:36px; }
        .back-link:hover { color:#fff; background:var(--accent); border-color:var(--accent); transform:translateX(-4px); }
        .card { background:var(--card-bg); backdrop-filter:blur(18px); border:1px solid var(--card-border); border-radius:24px; padding:36px; max-width:1400px; margin:0 auto; position:relative; overflow:hidden; animation:cardIn 0.5s ease both; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
        .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent2),var(--gold),var(--accent)); background-size:200% 100%; animation:shimmer 3s linear infinite; }
        .card::after { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 0%,var(--glow) 0%,transparent 60%); pointer-events:none; border-radius:24px; }
        @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }
        .card-header { display:flex; align-items:center; gap:16px; margin-bottom:28px; padding-bottom:22px; border-bottom:1px solid var(--card-border); flex-wrap:wrap; }
        .card-icon { width:48px; height:48px; border-radius:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 6px 20px rgba(255,107,53,0.3); flex-shrink:0; }
        .card-title { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; background:linear-gradient(135deg,var(--text) 40%,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .card-sub { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:3px; }
        .count-pill { margin-left:auto; background:rgba(255,107,53,0.12); border:1px solid var(--card-border); border-radius:100px; padding:6px 16px; font-size:12px; font-weight:600; color:var(--accent); white-space:nowrap; }

        /* ── Pagination Info Bar ── */
        .page-info-bar { display:flex; gap:0; background:rgba(255,107,53,0.05); border:1px solid var(--card-border); border-radius:16px; overflow:hidden; margin-bottom:24px; }
        .page-info-item { flex:1; padding:16px 20px; border-right:1px solid var(--card-border); display:flex; flex-direction:column; gap:4px; }
        .page-info-item:last-child { border-right:none; }
        .page-info-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); font-weight:600; }
        .page-info-value { font-size:22px; font-weight:700; color:var(--accent); font-family:'Playfair Display',serif; }

        /* ── Pagination Controls ── */
        .pagination-controls { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:28px; flex-wrap:wrap; }
        .page-btn { padding:9px 18px; border-radius:100px; border:1px solid var(--card-border); background:var(--card-bg); color:var(--text); font-size:13px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.25s; backdrop-filter:blur(10px); }
        .page-btn:hover:not(:disabled) { background:var(--accent); color:#fff; border-color:var(--accent); transform:scale(1.05); }
        .page-btn:disabled { opacity:0.3; cursor:not-allowed; }
        .page-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 14px rgba(255,107,53,0.4); }
        .page-size-wrap { display:flex; align-items:center; gap:8px; margin-left:16px; font-size:13px; color:var(--muted); }
        .page-size-select { background:var(--card-bg); border:1px solid var(--card-border); border-radius:100px; color:var(--text); padding:7px 14px; font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; outline:none; transition:all 0.25s; }
        .page-size-select:hover { border-color:var(--accent); }

        /* ── State messages ── */
        .msg-box { background:rgba(255,107,53,0.07); border:1px solid rgba(255,107,53,0.2); border-radius:14px; padding:18px 22px; color:var(--accent2); font-size:14px; display:flex; align-items:center; gap:10px; }
        .msg-box::before { content:'ℹ️'; font-size:18px; }

        /* ── Error block ── */
        .error-wrap { background:rgba(239,68,68,0.07); border:1px solid rgba(239,68,68,0.28); border-radius:20px; overflow:hidden; margin-bottom:24px; box-shadow:0 12px 36px rgba(239,68,68,0.12); animation:cardIn 0.45s ease both; }
        .error-header { background:rgba(239,68,68,0.13); padding:18px 26px; display:flex; align-items:center; gap:14px; border-bottom:1px solid rgba(239,68,68,0.18); }
        .error-icon-wrap { width:44px; height:44px; border-radius:12px; flex-shrink:0; background:linear-gradient(135deg,#ef4444,#dc2626); display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 4px 14px rgba(239,68,68,0.4); }
        .error-heading { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:#ef4444; }
        .error-heading-sub { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#f87171; margin-top:2px; opacity:0.8; }
        body.light .error-heading { color:#dc2626; } body.light .error-heading-sub { color:#ef4444; }
        .error-body { padding:20px 26px 24px; display:flex; flex-direction:column; gap:12px; }
        .error-row { display:flex; align-items:flex-start; gap:14px; padding:13px 16px; border-radius:12px; background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.12); transition:background 0.2s; }
        .error-row:hover { background:rgba(239,68,68,0.1); }
        .error-row-label { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:#f87171; min-width:72px; flex-shrink:0; padding-top:2px; }
        .error-row-value { font-size:14px; color:#fca5a5; font-weight:400; line-height:1.5; word-break:break-word; }
        body.light .error-row-label { color:#dc2626; } body.light .error-row-value { color:#b91c1c; }
        body.light .error-row { background:rgba(239,68,68,0.05); border-color:rgba(239,68,68,0.15); }
        .error-go-back { display:inline-flex; align-items:center; gap:8px; margin-top:4px; padding:10px 20px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); border-radius:100px; font-size:13px; font-weight:500; color:#f87171; text-decoration:none; transition:all 0.3s; width:fit-content; }
        .error-go-back:hover { background:#ef4444; color:#fff; border-color:#ef4444; transform:translateX(-3px); }
        body.light .error-go-back { color:#dc2626; }

        /* ── Table ── */
        .table-wrapper { overflow-x:auto; border-radius:16px; border:1px solid var(--card-border); }
        table { width:100%; border-collapse:collapse; font-size:13.5px; }
        thead tr { background:var(--th-bg); }
        th { padding:13px 16px; text-align:left; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); white-space:nowrap; border-bottom:1px solid var(--card-border); border-right:1px solid rgba(255,107,53,0.08); }
        th:last-child { border-right:none; }
        td { padding:12px 16px; border-bottom:1px solid var(--td-border); border-right:1px solid rgba(255,255,255,0.02); color:var(--text); vertical-align:middle; white-space:nowrap; }
        body.light td { border-right-color:rgba(0,0,0,0.03); }
        td:last-child { border-right:none; }
        tbody tr:last-child td { border-bottom:none; }
        tbody tr { transition:background 0.2s; }
        tbody tr:hover { background:var(--tr-hover); }
        th.group-start { border-left:2px solid rgba(255,107,53,0.35); }
        td.group-start { border-left:2px solid rgba(255,107,53,0.15); }

        @keyframes cardIn { from{opacity:0;transform:translateY(22px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes rowIn  { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
        @media(max-width:700px) { .page{padding:20px 16px} .card{padding:22px 16px} .page-info-bar{flex-wrap:wrap} .page-info-item{min-width:45%} .pagination-controls{gap:6px} .page-size-wrap{margin-left:0} }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>
<button class="toggle" onclick="toggleMode()">☀️ Light</button>

<div class="page">
    <a class="back-link" href="/">← Back to Home</a>

    <div class="card">
        <div class="card-header">
            <div class="card-icon">📊</div>
            <div>
                <div class="card-title">Results</div>
                <div class="card-sub">API Response</div>
            </div>
            <div class="count-pill" id="countPill" style="display:none"></div>
        </div>

        <!-- ERROR block -->
        <div class="error-wrap" th:if="${error}" id="errorWrap">
            <div class="error-header">
                <div class="error-icon-wrap">🚫</div>
                <div>
                    <div class="error-heading">Something went wrong</div>
                    <div class="error-heading-sub">API Error Response</div>
                </div>
            </div>
            <div class="error-body" id="errorBody"></div>
            <span id="rawError" th:text="${error}" style="display:none"></span>
        </div>

        <!-- String message -->
        <div class="msg-box" th:if="${data instanceof T(java.lang.String)}" th:text="${data}"></div>

        <!-- No data -->
        <div class="msg-box" th:if="${data == null and error == null}">No data found.</div>

        <!-- Empty list -->
        <div class="msg-box" th:if="${data != null and !(data instanceof T(java.lang.String)) and #lists.isEmpty(data)}">No records available.</div>

        <!-- Pagination Info Bar -->
        <div class="page-info-bar" id="pageInfoBar" style="display:none">
            <div class="page-info-item"><span class="page-info-label">Current Page</span><span class="page-info-value" id="infoCurrentPage">0</span></div>
            <div class="page-info-item"><span class="page-info-label">Total Pages</span><span class="page-info-value" id="infoTotalPages">0</span></div>
            <div class="page-info-item"><span class="page-info-label">Total Elements</span><span class="page-info-value" id="infoTotalElements">0</span></div>
            <div class="page-info-item"><span class="page-info-label">On This Page</span><span class="page-info-value" id="infoOnPage">0</span></div>
        </div>

        <!-- Table container — rebuilt by JS with flattened columns -->
        <div class="table-wrapper" id="tableWrap" style="display:none">
            <table id="dataTable">
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- Pagination Controls -->
        <div class="pagination-controls" id="paginationControls" style="display:none">
            <button class="page-btn" id="btnFirst" onclick="goToPage(0)">« First</button>
            <button class="page-btn" id="btnPrev"  onclick="goToPage(currentPage-1)">‹ Prev</button>
            <span id="pageNumbers" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;"></span>
            <button class="page-btn" id="btnNext"  onclick="goToPage(currentPage+1)">Next ›</button>
            <button class="page-btn" id="btnLast"  onclick="goToPage(totalPages-1)">Last »</button>
            <div class="page-size-wrap">
                Rows:
                <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize(this.value)">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
            </div>
        </div>

        <!-- Hidden Thymeleaf-rendered raw data -->
        <table id="rawTable" style="display:none" aria-hidden="true">
            <tbody th:if="${data != null and !(data instanceof T(java.lang.String)) and !#lists.isEmpty(data)}">
                <tr th:each="row : ${data}" th:attr="data-row=${row}"></tr>
            </tbody>
        </table>

    </div>
</div>

<script>
/* ─────────────────────────────────────────────────────────────────
   CORE STATE
───────────────────────────────────────────────────────────────── */
let flatRows    = [];
let allColumns  = [];
let currentPage = 0;
let pageSize    = 10;
let totalPages  = 0;

let isDark = true;
function toggleMode() {
    isDark = !isDark;
    document.body.classList.toggle('light', !isDark);
    document.querySelector('.toggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
}

/* ─────────────────────────────────────────────────────────────────
   FLATTEN NESTED OBJECTS
───────────────────────────────────────────────────────────────── */
function parseJavaObject(str) {
    const result = {};
    if (typeof str !== 'string') return null;
    str = str.trim();
    if (!str.startsWith('{') || !str.endsWith('}')) return null;
    const inner = str.slice(1, -1);
    const pairs = splitTopLevel(inner);
    for (const pair of pairs) {
        const eqIdx = pair.indexOf('=');
        if (eqIdx === -1) continue;
        const key = pair.slice(0, eqIdx).trim();
        const val = pair.slice(eqIdx + 1).trim();
        if (val.startsWith('{')) {
            const nested = parseJavaObject(val);
            result[key] = nested !== null ? nested : val;
        } else {
            result[key] = val === 'null' ? null : val;
        }
    }
    return Object.keys(result).length > 0 ? result : null;
}

function splitTopLevel(str) {
    const parts = [];
    let depth = 0, start = 0;
    for (let i = 0; i < str.length; i++) {
        if (str[i] === '{') depth++;
        else if (str[i] === '}') depth--;
        else if (str[i] === ',' && depth === 0 && str[i+1] === ' ') {
            parts.push(str.slice(start, i));
            start = i + 2;
        }
    }
    parts.push(str.slice(start));
    return parts.filter(p => p.trim());
}

function flattenObject(obj, prefix) {
    const flat = {};
    for (const [key, val] of Object.entries(obj)) {
        const fullKey = prefix ? prefix + '_' + key : key;
        if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
            Object.assign(flat, flattenObject(val, fullKey));
        } else if (typeof val === 'string' && val.startsWith('{')) {
            const parsed = parseJavaObject(val);
            if (parsed) {
                Object.assign(flat, flattenObject(parsed, fullKey));
            } else {
                flat[fullKey] = val;
            }
        } else {
            flat[fullKey] = val;
        }
    }
    return flat;
}

function parseRowString(rowStr) {
    const parsed = parseJavaObject(rowStr);
    if (!parsed) return {};
    return flattenObject(parsed, '');
}

/* ─────────────────────────────────────────────────────────────────
   BUILD HEADERS
   ✅ KEY CHANGE: Skips any column where ALL rows are null/empty.
   This removes columns like ORDER ID, RESTAURANT ID that show only "—"
───────────────────────────────────────────────────────────────── */
function buildColumns(rows) {
    const keySet = new Set();
    rows.forEach(r => Object.keys(r).forEach(k => keySet.add(k)));

    // Only keep a column if at least ONE row has a real value in it
    return Array.from(keySet).filter(col =>
        rows.some(r => {
            const v = r[col];
            return v !== null && v !== undefined && v !== 'null' && String(v).trim() !== '';
        })
    );
}

/* ─────────────────────────────────────────────────────────────────
   FORMAT CELL VALUE
───────────────────────────────────────────────────────────────── */
function formatCell(key, val) {
    if (val === null || val === undefined || val === 'null' || String(val).trim() === '')
        return '<span style="color:var(--muted);font-style:italic">—</span>';
    const k = key.toLowerCase();
    const v = String(val);

    if (k.includes('price') || k.includes('amount') || k.includes('discount') || k.includes('subtotal')) {
        return `<span style="font-weight:600;color:var(--accent2)">₹${esc(v)}</span>`;
    }
    if (k === 'orderstatus' || k === 'status') {
        const colors = { pending:'#fbbf24', delivered:'#22c55e', cancelled:'#ef4444', active:'#60a5fa', assigned:'#c084fc', completed:'#4ade80' };
        const c = colors[v.toLowerCase()] || 'var(--accent2)';
        return `<span style="background:rgba(255,255,255,0.06);border:1px solid ${c}40;border-radius:100px;padding:3px 12px;font-size:11px;font-weight:700;letter-spacing:0.5px;color:${c};text-transform:uppercase">${esc(v)}</span>`;
    }
    if (k === 'rating') {
        const n = parseInt(v);
        const stars = isNaN(n) ? '' : '★'.repeat(Math.min(n,5));
        return `<span style="background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.3);border-radius:100px;padding:3px 12px;font-size:12px;font-weight:700;color:#ffd700">${stars} ${esc(v)}/5</span>`;
    }
    if (k.endsWith('id') || k.endsWith('_id')) {
        return `<strong style="color:var(--accent)">${esc(v)}</strong>`;
    }
    if (k.includes('date') || k.includes('expiry')) {
        return `<span style="font-size:12px;color:var(--muted)">${esc(v)}</span>`;
    }
    return esc(v);
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────────────────────────────────────────────────────────
   RENDER PAGE
───────────────────────────────────────────────────────────────── */
function renderPage(page) {
    totalPages  = Math.ceil(flatRows.length / pageSize);
    currentPage = Math.max(0, Math.min(page, totalPages - 1));
    const start = currentPage * pageSize;
    const end   = Math.min(start + pageSize, flatRows.length);

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    for (let i = start; i < end; i++) {
        const tr = document.createElement('tr');
        tr.style.animation = `rowIn 0.3s ease ${((i - start) * 0.04)}s both`;
        allColumns.forEach((col, ci) => {
            const td = document.createElement('td');
            if (ci === 0) td.classList.add('group-start');
            td.innerHTML = formatCell(col, flatRows[i][col]);
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    }

    document.getElementById('infoCurrentPage').textContent   = currentPage;
    document.getElementById('infoTotalPages').textContent    = totalPages;
    document.getElementById('infoTotalElements').textContent = flatRows.length;
    document.getElementById('infoOnPage').textContent        = end - start;

    const pill = document.getElementById('countPill');
    pill.textContent = flatRows.length + (flatRows.length === 1 ? ' record' : ' records');
    pill.style.display = 'block';

    if (flatRows.length > pageSize) {
        document.getElementById('paginationControls').style.display = 'flex';
        updateButtons();
    } else {
        document.getElementById('paginationControls').style.display = 'none';
    }
}

function updateButtons() {
    document.getElementById('btnFirst').disabled = currentPage === 0;
    document.getElementById('btnPrev').disabled  = currentPage === 0;
    document.getElementById('btnNext').disabled  = currentPage === totalPages - 1;
    document.getElementById('btnLast').disabled  = currentPage === totalPages - 1;
    const numWrap = document.getElementById('pageNumbers');
    numWrap.innerHTML = '';
    const range = 2;
    const s = Math.max(0, currentPage - range);
    const e = Math.min(totalPages - 1, currentPage + range);
    for (let i = s; i <= e; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
        btn.textContent = i + 1;
        btn.onclick = ((p) => () => goToPage(p))(i);
        numWrap.appendChild(btn);
    }
}

function goToPage(page) {
    if (page < 0 || page >= totalPages) return;
    renderPage(page);
    document.querySelector('.card').scrollIntoView({ behavior:'smooth', block:'start' });
}

function changePageSize(val) {
    pageSize = parseInt(val);
    renderPage(0);
}

/* ─────────────────────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {

    const rawRows = document.querySelectorAll('#rawTable tbody tr');
    if (rawRows.length > 0) {
        flatRows   = Array.from(rawRows).map(tr => parseRowString(tr.getAttribute('data-row')));
        allColumns = buildColumns(flatRows);  // ← null-columns are filtered out here

        const thead = document.getElementById('tableHead');
        thead.innerHTML = '';
        allColumns.forEach((col, i) => {
            const th = document.createElement('th');
            if (i === 0) th.classList.add('group-start');
            th.textContent = col.replace(/_/g, ' ').replace(/([a-z])([A-Z])/g, '$1 $2').toUpperCase();
            thead.appendChild(th);
        });

        document.getElementById('tableWrap').style.display   = 'block';
        document.getElementById('pageInfoBar').style.display = 'flex';

        pageSize = parseInt(document.getElementById('pageSizeSelect').value);
        renderPage(0);
    }

    // ── Error block ──────────────────────────────────────────────
    const rawEl  = document.getElementById('rawError');
    const bodyEl = document.getElementById('errorBody');
    if (!rawEl || !bodyEl) return;
    const raw = rawEl.textContent.trim();
    if (!raw) return;
    let status = null, message = null, errorType = null;
    try {
        const obj = JSON.parse(raw);
        status    = obj.status    || null;
        errorType = obj.error     || null;
        message   = obj.message   || obj.detail || obj.description || obj.msg || null;
        if (!status) status = obj.statusCode || null;
    } catch (e) { message = raw; }
    const statusLabels = { 400:'400 — Bad Request',401:'401 — Unauthorized',403:'403 — Forbidden',404:'404 — Not Found',405:'405 — Method Not Allowed',409:'409 — Conflict',422:'422 — Unprocessable Entity',500:'500 — Internal Server Error',502:'502 — Bad Gateway',503:'503 — Service Unavailable' };
    const rows = [];
    if (status)    rows.push({ label:'Status',  icon:getStatusIcon(status), value:statusLabels[status]||String(status) });
    if (errorType) rows.push({ label:'Error',   icon:'🏷️', value:errorType });
    if (message)   rows.push({ label:'Message', icon:'💬', value:message });
    if (!rows.length) rows.push({ label:'Details', icon:'📄', value:raw });
    rows.forEach(r => {
        const d = document.createElement('div');
        d.className = 'error-row';
        d.innerHTML = `<span class="error-row-label">${r.icon} ${esc(r.label)}</span><span class="error-row-value">${esc(r.value)}</span>`;
        bodyEl.appendChild(d);
    });
    const btn = document.createElement('a');
    btn.className = 'error-go-back'; btn.href = 'javascript:history.back()'; btn.textContent = '← Go Back & Try Again';
    bodyEl.appendChild(btn);
});

function getStatusIcon(code) {
    if (code >= 500) return '🔥';
    if (code === 404) return '🔍';
    if (code === 403 || code === 401) return '🔒';
    if (code === 400 || code === 422) return '⚠️';
    return '❌';
}
