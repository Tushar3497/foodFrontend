<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root { --bg1:#0a0a0f; --accent:#ff6b35; --accent2:#f7c59f; --gold:#ffd700; --text:#f0ece3; --muted:#7a7a8a; --card-bg:rgba(255,255,255,0.045); --card-border:rgba(255,107,53,0.18); --glow:rgba(255,107,53,0.25); }
        body.light { --bg1:#fff8f3; --accent:#e85d04; --accent2:#f4a261; --text:#1a1a2e; --muted:#999; --card-bg:rgba(255,255,255,0.88); --card-border:rgba(232,93,4,0.2); --glow:rgba(232,93,4,0.12); }
        body { font-family:'DM Sans',sans-serif; background:var(--bg1); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow-x:hidden; transition:background 0.5s,color 0.5s; padding:40px 20px; }

        /* ── Background orbs ── */
        .bg-canvas { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
        .orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.15; animation:drift 18s ease-in-out infinite alternate; }
        .orb1 { width:500px; height:500px; background:#ff6b35; top:-130px; left:-100px; animation-duration:14s; }
        .orb2 { width:360px; height:360px; background:#ff9a3c; bottom:-80px; right:-60px; animation-duration:20s; animation-delay:-6s; }
        .orb3 { width:240px; height:240px; background:#ffcc44; top:40%; left:60%; animation-duration:17s; animation-delay:-4s; }
        body.light .orb { opacity:0.1; }
        @keyframes drift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(40px,30px) scale(1.1)} }
        body::after { content:''; position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0.4; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E"); }

        /* ── Toggle ── */
        .toggle { position:fixed; top:22px; right:26px; z-index:100; background:var(--card-bg); backdrop-filter:blur(12px); border:1px solid var(--card-border); border-radius:100px; padding:10px 20px; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; color:var(--text); font-weight:500; transition:all 0.3s; }
        .toggle:hover { background:var(--accent); color:#fff; border-color:var(--accent); transform:scale(1.05); }

        /* ── Wrapper ── */
        .wrapper { position:relative; z-index:10; width:100%; max-width:560px; display:flex; flex-direction:column; align-items:center; gap:24px; }

        /* ── SUCCESS CARD ── */
        .success-card {
            width:100%; background:var(--card-bg); backdrop-filter:blur(18px);
            border:1px solid var(--card-border); border-radius:28px;
            overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,0.3);
            animation:cardIn 0.55s ease both;
            display: none; /* shown by JS if message exists */
        }
        .success-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent2),var(--gold),var(--accent)); background-size:200% 100%; animation:shimmer 3s linear infinite; }
        @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

        .success-top {
            padding:38px 36px 30px;
            display:flex; flex-direction:column; align-items:center; gap:18px;
            text-align:center;
        }

        /* Animated checkmark circle */
        .check-circle {
            width:72px; height:72px; border-radius:50%;
            background:linear-gradient(135deg, #22c55e, #16a34a);
            display:flex; align-items:center; justify-content:center;
            font-size:32px; box-shadow:0 8px 28px rgba(34,197,94,0.4);
            animation:popIn 0.5s 0.2s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes popIn { from{opacity:0;transform:scale(0.3)} to{opacity:1;transform:scale(1)} }

        .success-title {
            font-family:'Playfair Display',serif; font-size:28px; font-weight:700;
            background:linear-gradient(135deg, #22c55e, #86efac);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }

        .success-msg {
            font-size:15px; color:var(--text); line-height:1.6;
            background:rgba(34,197,94,0.07); border:1px solid rgba(34,197,94,0.2);
            border-radius:14px; padding:14px 20px; width:100%;
            display:flex; align-items:center; gap:10px;
        }
        .success-msg::before { content:'✅'; font-size:18px; flex-shrink:0; }

        .success-divider { width:100%; height:1px; background:var(--card-border); }

        .success-footer { padding:22px 36px 28px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

        /* ── ERROR CARD ── */
        .error-card {
            width:100%; background:rgba(239,68,68,0.06);
            backdrop-filter:blur(18px);
            border:1px solid rgba(239,68,68,0.28); border-radius:28px;
            overflow:hidden; box-shadow:0 24px 60px rgba(239,68,68,0.12);
            animation:cardIn 0.55s 0.1s ease both;
            display:none; /* shown by JS if error exists */
        }

        .error-top {
            background:rgba(239,68,68,0.1);
            padding:28px 36px 24px;
            display:flex; align-items:center; gap:16px;
            border-bottom:1px solid rgba(239,68,68,0.18);
        }

        .error-icon {
            width:52px; height:52px; border-radius:14px; flex-shrink:0;
            background:linear-gradient(135deg,#ef4444,#dc2626);
            display:flex; align-items:center; justify-content:center;
            font-size:24px; box-shadow:0 6px 20px rgba(239,68,68,0.4);
            animation:popIn 0.5s 0.2s cubic-bezier(.34,1.56,.64,1) both;
        }

        .error-heading { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:#ef4444; }
        .error-subhead { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#f87171; margin-top:3px; opacity:0.8; }
        body.light .error-heading { color:#dc2626; }
        body.light .error-subhead { color:#ef4444; }

        .error-body { padding:24px 36px 28px; display:flex; flex-direction:column; gap:14px; }

        .error-row {
            display:flex; align-items:flex-start; gap:14px;
            padding:14px 18px; border-radius:14px;
            background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.12);
            transition:background 0.2s;
        }
        .error-row:hover { background:rgba(239,68,68,0.1); }
        .error-row-label { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:#f87171; min-width:72px; flex-shrink:0; padding-top:2px; }
        .error-row-value { font-size:15px; color:#fca5a5; font-weight:400; line-height:1.5; word-break:break-word; }
        body.light .error-row-label { color:#dc2626; }
        body.light .error-row-value { color:#b91c1c; }
        body.light .error-row { background:rgba(239,68,68,0.05); border-color:rgba(239,68,68,0.15); }

        /* ── Buttons ── */
        .btn-primary {
            display:inline-flex; align-items:center; gap:8px;
            padding:12px 28px; border-radius:100px; font-size:14px; font-weight:600;
            font-family:'DM Sans',sans-serif; cursor:pointer; text-decoration:none;
            transition:all 0.3s; border:none;
            background:linear-gradient(135deg,var(--accent),#e05a28);
            color:#fff; box-shadow:0 6px 20px rgba(255,107,53,0.35);
        }
        .btn-primary:hover { transform:translateY(-2px) scale(1.03); box-shadow:0 10px 28px rgba(255,107,53,0.5); }

        .btn-secondary {
            display:inline-flex; align-items:center; gap:8px;
            padding:12px 24px; border-radius:100px; font-size:14px; font-weight:500;
            font-family:'DM Sans',sans-serif; cursor:pointer; text-decoration:none;
            transition:all 0.3s;
            background:var(--card-bg); backdrop-filter:blur(10px);
            border:1px solid var(--card-border); color:var(--text);
        }
        .btn-secondary:hover { background:var(--accent); color:#fff; border-color:var(--accent); transform:translateY(-2px); }

        .btn-error-back {
            display:inline-flex; align-items:center; gap:8px;
            padding:11px 22px; border-radius:100px; font-size:13px; font-weight:500;
            font-family:'DM Sans',sans-serif; cursor:pointer; text-decoration:none;
            transition:all 0.3s; margin-top:4px;
            background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25);
            color:#f87171;
        }
        .btn-error-back:hover { background:#ef4444; color:#fff; border-color:#ef4444; transform:translateX(-3px); }
        body.light .btn-error-back { color:#dc2626; }

        /* ── Raw error hidden ── */
        #rawError { display:none; }

        /* ── Animations ── */
        @keyframes cardIn { from{opacity:0;transform:translateY(26px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
        @media(max-width:480px) { .success-top,.error-body { padding:24px 20px; } .success-footer { padding:18px 20px 24px; } .error-top { padding:22px 20px; } }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
</div>

<button class="toggle" onclick="toggleMode()">☀️ Light</button>

<div class="wrapper">

    <!-- ✅ SUCCESS CARD -->
    <div class="success-card" id="successCard">
        <div style="position:relative">
            <div class="success-top">
                <div class="check-circle">✓</div>
                <div class="success-title">Success!</div>
                <div class="success-msg" id="successMsg"></div>
            </div>
            <div class="success-divider"></div>
            <div class="success-footer">
                <a href="/" class="btn-primary">🏠 Back to Home</a>
                <a href="javascript:history.back()" class="btn-secondary">← Go Back</a>
            </div>
        </div>
    </div>

    <!-- ❌ ERROR CARD -->
    <div class="error-card" id="errorCard">
        <div class="error-top">
            <div class="error-icon">🚫</div>
            <div>
                <div class="error-heading">Something went wrong</div>
                <div class="error-subhead">API Error Response</div>
            </div>
        </div>
        <div class="error-body" id="errorBody"></div>
    </div>

    <!-- Hidden raw values from Thymeleaf -->
    <span id="rawMessage" th:text="${message}" style="display:none"></span>
    <span id="rawError"   th:text="${error}"   style="display:none"></span>

</div>

<script>
let isDark = true;
function toggleMode() {
    isDark = !isDark;
    document.body.classList.toggle('light', !isDark);
    document.querySelector('.toggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
}

document.addEventListener('DOMContentLoaded', () => {
    const msgEl  = document.getElementById('rawMessage');
    const errEl  = document.getElementById('rawError');
    const msg    = msgEl  ? msgEl.textContent.trim()  : '';
    const err    = errEl  ? errEl.textContent.trim()  : '';

    // ── Show success ──────────────────────────────────────────
    if (msg) {
        const card = document.getElementById('successCard');
        const box  = document.getElementById('successMsg');
        box.appendChild(document.createTextNode(msg));
        card.style.display = 'block';
    }

    // ── Show error ────────────────────────────────────────────
    if (err) {
        const card = document.getElementById('errorCard');
        const body = document.getElementById('errorBody');

        let status = null, errorType = null, message = null;

        try {
            const obj = JSON.parse(err);
            status    = obj.status    || null;
            errorType = obj.error     || null;
            message   = obj.message   || obj.detail || obj.msg || null;
        } catch (e) {
            message = err; // plain string error
        }

        const statusLabels = {
            400:'400 — Bad Request', 401:'401 — Unauthorized',
            403:'403 — Forbidden',   404:'404 — Not Found',
            405:'405 — Method Not Allowed', 409:'409 — Conflict',
            422:'422 — Unprocessable Entity', 500:'500 — Internal Server Error',
            502:'502 — Bad Gateway', 503:'503 — Service Unavailable'
        };

        const statusIcons = {
            404:'🔍', 401:'🔒', 403:'🔒', 500:'🔥', 400:'⚠️', 422:'⚠️'
        };

        const rows = [];
        if (status)    rows.push({ label:'Status',  icon: statusIcons[status] || '❌', value: statusLabels[status] || String(status) });
        if (errorType) rows.push({ label:'Error',   icon:'🏷️', value: errorType });
        if (message)   rows.push({ label:'Message', icon:'💬', value: message });
        if (!rows.length) rows.push({ label:'Details', icon:'📄', value: err });

        rows.forEach(r => {
            const div = document.createElement('div');
            div.className = 'error-row';
            div.innerHTML = `<span class="error-row-label">${r.icon} ${esc(r.label)}</span>
                             <span class="error-row-value">${esc(r.value)}</span>`;
            body.appendChild(div);
        });

        // Go back button
        const btn = document.createElement('a');
        btn.className = 'btn-error-back';
        btn.href = 'javascript:history.back()';
        btn.innerHTML = '← Go Back &amp; Try Again';
        body.appendChild(btn);

        card.style.display = 'block';
    }

    // ── Neither message nor error ─────────────────────────────
    if (!msg && !err) {
        const card = document.getElementById('successCard');
        document.getElementById('successMsg').textContent = 'Operation completed successfully.';
        card.style.display = 'block';
    }
});

function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
